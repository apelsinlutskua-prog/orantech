<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orantech — Гіпермаркет техніки Луцьк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .orange-gradient { background: linear-gradient(135deg, #FF6B00 0%, #FF9E00 100%); }
        #category-menu, #user-panel, #callback-modal, #checkout-page { display: none; }
        .liked { color: #ff4d4d !important; }
        .banner-shadow { shadow-lg; transition: transform 0.3s; }
        .banner-shadow:hover { transform: scale(1.01); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="main-site">
        <nav class="bg-white sticky top-0 z-50 border-b border-gray-100 shadow-sm">
            <div class="container mx-auto px-4 py-4 flex flex-wrap items-center gap-4">
                <div class="flex items-center space-x-2">
                    <button onclick="toggleMenu()" class="text-gray-900 p-2 hover:bg-gray-100 rounded-xl transition">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="flex flex-col cursor-pointer" onclick="location.reload()">
                        <span class="text-xl font-900 tracking-tighter uppercase leading-none italic">ORAN<span class="text-orange-500">TECH</span></span>
                    </div>
                </div>

                <div class="flex-1 min-w-[250px]">
                    <input type="text" id="searchInput" onkeyup="filterGroups()" placeholder="Пошук по всьому гіпермаркету..." class="w-full bg-gray-100 border-none rounded-2xl px-6 py-3 text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none">
                </div>

                <div class="flex items-center space-x-2">
                    <button id="cart-btn" onclick="goToCheckout()" class="bg-orange-500 text-white px-5 py-3 rounded-2xl font-black flex items-center space-x-2 shadow-lg hover:scale-105 transition">
                        <span>🛒</span>
                        <span id="cart-count">0</span>
                    </button>
                </div>
            </div>
            
            <div id="category-menu" class="bg-white border-b shadow-2xl overflow-y-auto max-h-[60vh] absolute w-full z-40">
                <div class="container mx-auto px-6 py-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-2" id="menu-items"></div>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-6">
            
            <div id="promo-banner" class="mb-10 group cursor-pointer" onclick="showProduct('Побутова техніка')">
                <div class="relative overflow-hidden rounded-[30px] shadow-2xl banner-shadow border border-gray-100">
                    <img src="1244х337 акция с подарком.jpg" alt="Акція KitchenAid" class="w-full h-auto object-cover" onerror="this.src='https://placehold.co/1244x337?text=KitchenAid+Акція+Енергія+Весни'">
                    <div class="absolute inset-0 bg-gradient-to-r from-orange-500/10 to-transparent pointer-events-none"></div>
                </div>
            </div>

            <div id="active-product-area" class="max-w-4xl mx-auto">
                <div id="welcome-msg" class="text-center py-20 opacity-20 italic font-black text-xs uppercase tracking-[0.4em]">
                    Оберіть категорію в меню або через пошук
                </div>
            </div>
        </main>

        <footer class="bg-gray-900 text-white py-10 mt-20">
            <div class="container mx-auto px-6 text-center italic">
                <p class="text-sm font-bold">📍 Луцьк, вул. Євгена Сверстюка, 1</p>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest font-black">ФОП Томчик Є.В. — Техніка та сервіс</p>
            </div>
        </footer>
    </div>

    <button onclick="toggleCallback()" class="fixed bottom-6 right-6 orange-gradient text-white p-5 rounded-full shadow-2xl z-50 animate-bounce">📞</button>

    <div id="callback-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-[60] flex items-center justify-center p-6 text-center">
        <div class="bg-white rounded-[40px] p-8 max-w-sm w-full">
            <h3 class="text-2xl font-900 uppercase italic mb-6">Вам передзвонити?</h3>
            <input type="tel" id="callPhone" value="+380" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 mb-6 text-center font-black outline-none focus:border-orange-500">
            <button onclick="sendCallback()" class="w-full orange-gradient text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Чекаю дзвінка</button>
            <button onclick="toggleCallback()" class="mt-4 text-gray-300 text-[10px] font-black uppercase">Скасувати</button>
        </div>
    </div>

    <div id="checkout-page" class="min-h-screen bg-white p-6">
        <div class="max-w-2xl mx-auto py-10 font-bold italic">
            <h2 class="text-4xl font-900 uppercase italic mb-10 border-b-8 border-orange-500 inline-block">Ваше замовлення</h2>
            <div id="checkout-list" class="mb-10 space-y-4 text-lg"></div>
            <button onclick="confirmOrder()" class="w-full orange-gradient text-white py-6 rounded-3xl font-black uppercase italic shadow-2xl text-xl">Надіслати у Viber 🚀</button>
            <button onclick="location.reload()" class="w-full mt-6 text-gray-400 uppercase text-xs">← Повернутись до покупок</button>
        </div>
    </div>

    <script>
        const groups = ["МФП, принтери", "Ліхтарі, лампи", "Телефони, факси", "ББЖ, акумулятори", "Модеми, роутери", "LED", "Витратні HP/Canon", "Пам'ять та SSD", "Материнські плати", "Відеоадаптери", "Монітори", "Мишки, клавіатури", "Папір офісний А4", "Послуги СЕРВІС", "Побутова техніка", "Канцтовари"];
        
        let cart = {};
        let currentQty = 1;

        function renderMenu(items = groups) {
            document.getElementById('menu-items').innerHTML = items.map(g => `
                <button onclick="showProduct('${g}')" class="text-left px-4 py-3 bg-gray-50 rounded-xl text-[10px] font-bold uppercase hover:bg-orange-50 transition">${g}</button>
            `).join('');
        }

        function filterGroups() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = groups.filter(g => g.toLowerCase().includes(q));
            if(q.length > 0) {
                document.getElementById('category-menu').style.display = 'block';
                renderMenu(filtered);
            } else {
                document.getElementById('category-menu').style.display = 'none';
            }
        }

        function toggleMenu() { 
            const m = document.getElementById('category-menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block'; 
            renderMenu(); 
        }

        function toggleCallback() { 
            const c = document.getElementById('callback-modal');
            c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; 
        }

        function showProduct(name) {
            document.getElementById('category-menu').style.display = 'none';
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('promo-banner').style.display = 'none';
            currentQty = 1;
            
            document.getElementById('active-product-area').innerHTML = `
                <div class="bg-white p-10 rounded-[40px] shadow-2xl border-t-8 border-orange-500 animate-fadeIn italic">
                    <h3 class="text-4xl font-900 uppercase mb-8 leading-tight">${name}</h3>
                    
                    <div class="flex flex-wrap items-center gap-4 mb-10">
                        <div class="flex items-center bg-gray-100 rounded-3xl p-3 border-2 border-gray-50">
                            <button onclick="changeQty(-1)" class="w-12 h-12 font-black text-2xl hover:text-orange-500 transition">-</button>
                            <span id="qty-display" class="w-16 text-center font-black text-2xl">1</span>
                            <button onclick="changeQty(1)" class="w-12 h-12 font-black text-2xl hover:text-orange-500 transition">+</button>
                        </div>
                        <button onclick="addToCart('${name}')" class="flex-1 orange-gradient text-white py-6 rounded-3xl font-black uppercase text-xl shadow-xl active:scale-95 transition-all">Додати в кошик</button>
                    </div>
                    
                    <div class="p-6 bg-orange-50 rounded-3xl border border-dashed border-orange-200">
                        <p class="text-xs font-bold text-orange-800 uppercase">⚡️ Швидка доставка по Луцьку або самовивіз з вул. Сверстюка, 1</p>
                    </div>
                </div>
            `;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function changeQty(val) {
            currentQty = Math.max(1, currentQty + val);
            document.getElementById('qty-display').innerText = currentQty;
        }

        function addToCart(name) {
            cart[name] = (cart[name] || 0) + currentQty;
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b)=>a+b, 0);
            const btn = document.getElementById('cart-btn');
            btn.classList.add('scale-125');
            setTimeout(() => btn.classList.remove('scale-125'), 200);
        }

        function goToCheckout() {
            if(!Object.keys(cart).length) return;
            document.getElementById('main-site').style.display = 'none';
            document.getElementById('checkout-page').style.display = 'block';
            document.getElementById('checkout-list').innerHTML = Object.entries(cart).map(([n,q])=>`
                <div class="flex justify-between items-center border-b-2 border-gray-100 pb-4">
                    <span class="uppercase font-900">${n}</span>
                    <span class="bg-orange-100 text-orange-600 px-4 py-1 rounded-full">${q} шт.</span>
                </div>
            `).join('');
            window.scrollTo(0,0);
        }

        function confirmOrder() {
            const txt = '🛒 НОВЕ ЗАМОВЛЕННЯ:\n' + Object.entries(cart).map(([n,q])=>`• ${n}: ${q} шт.`).join('\n');
            window.location.href = `viber://forward?text=${encodeURIComponent(txt)}`;
        }

        function sendCallback() {
            const p = document.getElementById('callPhone').value;
            window.location.href = `viber://forward?text=${encodeURIComponent('📞 ПЕРЕДЗВОНІТЬ МЕНІ: ' + p)}`;
        }

        renderMenu();
    </script>
</body>
</html>
