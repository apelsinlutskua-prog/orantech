<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orantech — Техніка Луцьк | ФОП Томчик Є.В.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .orange-gradient { background: linear-gradient(135deg, #FF6B00 0%, #FF9E00 100%); }
        #category-menu, #user-panel, #callback-modal { display: none; }
        .checkout-page { display: none; }
        .liked { color: #ff4d4d !important; }
        .cart-animation { animation: cart-pop 0.3s ease-out; }
        @keyframes cart-pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <div id="main-site">
        <nav class="bg-white sticky top-0 z-50 border-b border-gray-100 shadow-sm">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center gap-2">
                <div class="flex items-center space-x-2">
                    <button onclick="toggleMenu()" class="text-gray-900 p-2 hover:bg-gray-100 rounded-xl transition">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <div class="flex flex-col cursor-pointer" onclick="location.reload()">
                        <span class="text-lg font-900 tracking-tighter uppercase leading-none italic">ORAN<span class="text-orange-500">TECH</span></span>
                    </div>
                </div>

                <div class="flex items-center space-x-2">
                    <button onclick="toggleUserPanel()" class="p-3 bg-gray-100 rounded-2xl hover:bg-orange-100 transition">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </button>
                    <button id="cart-btn" onclick="goToCheckout()" class="bg-orange-500 text-white px-5 py-3 rounded-2xl font-black flex items-center space-x-2 shadow-lg hover:scale-105 transition">
                        <span class="text-xs">🛒</span>
                        <span id="cart-count" class="text-xs">0</span>
                    </button>
                </div>
            </div>
            
            <div id="category-menu" class="bg-white border-b shadow-2xl overflow-y-auto max-h-[70vh] absolute w-full z-40">
                <div class="container mx-auto px-6 py-8 grid grid-cols-1 md:grid-cols-3 gap-2" id="menu-items"></div>
            </div>

            <div id="user-panel" class="absolute right-4 mt-2 w-72 bg-white border rounded-[30px] shadow-2xl p-6 z-50">
                <h4 class="font-900 uppercase italic text-sm mb-4">Кабінет</h4>
                <input type="text" id="userName" placeholder="Ваше ім'я" class="w-full text-xs border-b pb-1 outline-none focus:border-orange-500 mb-4">
                <div class="text-[10px] text-gray-400 uppercase font-black mb-2">Улюблене:</div>
                <ul id="liked-items" class="text-[10px] space-y-2 italic text-orange-600 mb-4"></ul>
                <button onclick="saveUser()" class="w-full bg-gray-900 text-white text-[10px] py-2 rounded-xl uppercase font-black">Зберегти</button>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-10 min-h-[60vh]">
            <div id="welcome-text" class="text-center py-20 opacity-30 italic font-black text-xs uppercase tracking-[0.3em]">Відкрийте меню ☰ для вибору товару</div>
            <div id="active-product-area" class="max-w-2xl mx-auto"></div>
        </main>

        <footer class="bg-gray-900 text-white py-12">
            <div class="container mx-auto px-6 text-center text-[10px] font-bold uppercase tracking-widest text-gray-500">
                📍 Луцьк, вул. Євгена Сверстюка, 1 | ФОП Томчик Є.В.
            </div>
        </footer>
    </div>

    <button onclick="toggleCallback()" class="fixed bottom-6 right-6 orange-gradient text-white p-5 rounded-full shadow-2xl hover:scale-110 transition-all z-50">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
    </button>

    <div id="callback-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-8 max-w-sm w-full shadow-2xl text-center relative">
            <button onclick="toggleCallback()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-900">✕</button>
            <h3 class="text-2xl font-900 uppercase italic mb-4 tracking-tighter">Передзвонити вам?</h3>
            <p class="text-xs text-gray-400 mb-6 font-bold italic">Ми зателефонуємо протягом 15 хвилин</p>
            <input type="tel" id="callPhone" value="+380" class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 mb-4 outline-none focus:border-orange-500 font-black text-center">
            <button onclick="sendCallback()" class="w-full orange-gradient text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Чекаю на дзвінок 📞</button>
        </div>
    </div>

    <div id="checkout-page" class="min-h-screen bg-white p-6 checkout-page">
        <div class="max-w-md mx-auto py-10">
            <button onclick="location.reload()" class="text-gray-400 font-bold text-[10px] mb-8 uppercase tracking-widest">← Назад</button>
            <h2 class="text-3xl font-900 uppercase italic mb-6">Кошик</h2>
            <div id="checkout-list" class="mb-8 space-y-4 font-bold italic text-sm border-t pt-4"></div>
            <button onclick="confirmOrder()" class="w-full orange-gradient text-white py-6 rounded-3xl font-black uppercase italic shadow-xl">Замовити у Viber</button>
        </div>
    </div>

    <script>
        const groups = ["МФП, принтери", "Ноутбуки, планшети", "Папір офісний А4", "Картриджі HP/Canon", "ББЖ, акумулятори", "Роутери, модеми", "Мишки, клавіатури", "Послуги СЕРВІС", "Канцтовари"];
        let cart = {};
        let userData = JSON.parse(localStorage.getItem('orantech_user')) || { name: '', liked: [] };

        function renderMenu() {
            document.getElementById('menu-items').innerHTML = groups.map(g => `
                <button onclick="showProduct('${g}')" class="text-left px-4 py-3 bg-gray-50 rounded-xl text-[10px] font-bold uppercase hover:bg-orange-50 transition">${g}</button>
            `).join('');
        }

        function toggleMenu() { const m = document.getElementById('category-menu'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
        function toggleUserPanel() { const p = document.getElementById('user-panel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; updateUserUI(); }
        function toggleCallback() { const c = document.getElementById('callback-modal'); c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; }

        function showProduct(name) {
            toggleMenu();
            const isLiked = userData.liked.includes(name) ? 'liked' : '';
            document.getElementById('welcome-text').style.display = 'none';
            document.getElementById('active-product-area').innerHTML = `
                <div class="bg-white p-10 rounded-[40px] shadow-2xl border-t-8 border-orange-500 animate-fadeIn relative">
                    <div class="flex justify-between items-start mb-6">
                        <h3 class="text-2xl font-900 uppercase italic leading-tight max-w-[80%]">${name}</h3>
                        <button onclick="toggleLike('${name}')" class="text-3xl ${isLiked} transition-colors" id="like-btn">❤</button>
                    </div>
                    <button onclick="addToCart('${name}')" class="w-full orange-gradient text-white py-5 rounded-3xl font-black uppercase italic shadow-lg active:scale-95 transition-all">В кошик</button>
                    <div class="mt-8 pt-6 border-t">
                        <p class="text-[10px] text-gray-400 uppercase font-black italic mb-2">Написати відгук:</p>
                        <div class="flex gap-2">
                            <input type="text" id="revInput" placeholder="..." class="flex-1 bg-gray-50 rounded-xl px-4 py-2 text-xs outline-none">
                            <button onclick="addReview()" class="bg-gray-900 text-white px-4 rounded-xl text-[10px] font-black uppercase">Ок</button>
                        </div>
                        <div id="reviews" class="mt-4 space-y-2 text-[10px] italic text-gray-500"></div>
                    </div>
                </div>
            `;
        }

        function addToCart(name) {
            cart[name] = (cart[name] || 0) + 1;
            const count = Object.values(cart).reduce((a,b)=>a+b, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-btn').classList.add('cart-animation');
            setTimeout(() => document.getElementById('cart-btn').classList.remove('cart-animation'), 300);
        }

        function toggleLike(name) {
            userData.liked = userData.liked.includes(name) ? userData.liked.filter(i=>i!==name) : [...userData.liked, name];
            saveUser();
            showProduct(name);
        }

        function saveUser() {
            userData.name = document.getElementById('userName').value || userData.name;
            localStorage.setItem('orantech_user', JSON.stringify(userData));
            updateUserUI();
        }

        function updateUserUI() {
            document.getElementById('userName').value = userData.name;
            document.getElementById('liked-items').innerHTML = userData.liked.map(i => `<li>• ${i}</li>`).join('');
        }

        function goToCheckout() {
            if(!Object.keys(cart).length) return;
            document.getElementById('main-site').style.display = 'none';
            document.getElementById('checkout-page').style.display = 'block';
            document.getElementById('checkout-list').innerHTML = Object.entries(cart).map(([n,q])=>`
                <div class="flex justify-between border-b border-gray-100 pb-2">
                    <span>${n}</span><span>${q} шт.</span>
                </div>
            `).join('');
        }

        function confirmOrder() {
            const txt = 'ЗАМОВЛЕННЯ: ' + Object.entries(cart).map(([n,q])=>`${n}(${q})`).join(', ');
            window.location.href = `viber://forward?text=${encodeURIComponent(txt)}`;
        }

        function sendCallback() {
            const p = document.getElementById('callPhone').value;
            const msg = `Передзвоніть мені, будь ласка! Тел: ${p}`;
            window.location.href = `viber://forward?text=${encodeURIComponent(msg)}`;
        }

        function addReview() {
            const i = document.getElementById('revInput'); if(!i.value) return;
            const d = document.createElement('p'); d.innerText = `— "${i.value}"`;
            document.getElementById('reviews').appendChild(d); i.value = '';
        }

        renderMenu();
        updateUserUI();
    </script>
</body>
</html>
