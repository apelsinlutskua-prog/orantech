<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORANTECH — Луцьк</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f9fafb; }
        .orange-gradient { background: linear-gradient(135deg, #FF6B00 0%, #FF9E00 100%); }
        .page, #category-menu, #fop-fields, #callback-modal { display: none; }
        .active-page { display: block; }
        .italic-black { font-style: italic; font-weight: 900; text-transform: uppercase; }
        .btn-click:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="text-gray-900 italic-black">

    <nav class="bg-white sticky top-0 z-50 border-b shadow-sm">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="p-2 hover:bg-gray-100 rounded-xl">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div onclick="goHome()" class="cursor-pointer">
                    <span class="text-2xl tracking-tighter">ORAN<span class="text-orange-500">TECH</span></span>
                </div>
            </div>
            <div class="flex-1 max-w-md">
                <input type="text" id="searchInput" onkeyup="handleSearch(this.value)" placeholder="ПОШУК..." class="w-full bg-gray-100 px-6 py-3 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 italic-black text-sm border-none">
            </div>
            <button onclick="showPage('cart-page')" class="bg-orange-500 text-white px-6 py-3 rounded-2xl shadow-lg btn-click">
                🛒 <span id="cart-count">0</span>
            </button>
        </div>
        <div id="category-menu" class="absolute w-full bg-white border-b shadow-2xl p-8 grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </nav>

    <div id="callback-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[50px] p-12 text-center relative border-b-[15px] border-orange-500">
            <button onclick="closeCallback()" class="absolute top-8 right-8 text-2xl text-gray-300">✕</button>
            <h3 class="text-2xl mb-8 uppercase">Ваш номер:</h3>
            <input type="tel" id="cbPhone" placeholder="+380..." class="w-full bg-gray-100 p-6 rounded-3xl mb-8 text-center text-2xl outline-none italic-black border-none">
            <button onclick="sendCallback()" class="w-full orange-gradient text-white py-6 rounded-3xl btn-click shadow-xl">ЧЕКАЮ ДЗВІНКА</button>
        </div>
    </div>

    <div id="home-page" class="page active-page container mx-auto px-4 py-8">
        <div id="main-banner" class="mb-12 rounded-[50px] overflow-hidden shadow-2xl cursor-pointer transition hover:scale-[1.01]" onclick="openProduct('Canon MF3010')">
            <img src="promo.jpg" class="w-full h-auto object-cover" alt="Banner">
        </div>

        <div id="service-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div class="bg-white p-12 rounded-[50px] shadow-sm text-center border">
                <div class="text-6xl mb-4">⚡</div><div class="text-xs">ШВИДКИЙ СЕРВІС</div>
            </div>
            <div class="bg-white p-12 rounded-[50px] shadow-sm text-center border-orange-100 border-2">
                <div class="text-6xl mb-4">🤝</div><div class="text-xs text-orange-600">ДЛЯ ФОП ТА ЮРИДИЧНИХ</div>
            </div>
            <div class="bg-white p-12 rounded-[50px] shadow-sm text-center border">
                <div class="text-6xl mb-4">📍</div><div class="text-xs">ЛУЦЬК, СВЕРСТЮКА, 1</div>
            </div>
        </div>
        <div id="search-result-area"></div>
    </div>

    <div id="product-page" class="page container mx-auto px-4 py-8">
        <div class="bg-white rounded-[60px] shadow-2xl overflow-hidden flex flex-col md:flex-row border-b-[20px] border-orange-500">
            <div class="md:w-1/2 bg-gray-50 p-16 flex justify-center items-center">
                <img id="p-img" src="" class="max-h-[450px] drop-shadow-2xl">
            </div>
            <div class="md:w-1/2 p-20 flex flex-col justify-center">
                <button onclick="goHome()" class="text-orange-500 mb-6 text-[10px]">← НАЗАД</button>
                <h1 id="p-title" class="text-6xl mb-6 leading-none"></h1>
                <div id="p-price" class="text-5xl text-orange-600 mb-10"></div>
                <p id="p-desc" class="text-gray-500 text-sm mb-12 border-l-4 border-orange-500 pl-6"></p>
                <button onclick="addToCart(currentProduct)" class="w-full orange-gradient text-white py-8 rounded-[35px] text-2xl shadow-xl btn-click">У КОШИК 🛒</button>
            </div>
        </div>
    </div>

    <div id="cart-page" class="page container mx-auto px-4 py-16">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-5xl mb-12 italic-black underline decoration-orange-500">ОФОРМЛЕННЯ</h2>
            <div id="cart-items" class="mb-12 text-2xl border-t pt-10"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                <select id="sMethod" class="p-6 bg-gray-100 rounded-3xl outline-none border-none italic-black"><option value="Самовивіз">САМОВИВІЗ (ЛУЦЬК)</option><option value="Нова Пошта">НОВА ПОШТА</option></select>
                <select id="pMethod" onchange="toggleFop()" class="p-6 bg-gray-100 rounded-3xl outline-none border-none italic-black"><option value="viber">VIBER / ГOТІВКА</option><option value="fop">РАХУНОК ФОП (PDF)</option></select>
            </div>
            <div id="fop-fields" class="bg-orange-50 p-12 rounded-[50px] mb-12 space-y-6 border-2 border-orange-100">
                <input type="text" id="fopName" placeholder="НАЗВА ФОП" class="p-6 rounded-3xl w-full border-none italic-black">
                <input type="text" id="fopCode" placeholder="ЄДРПОУ" class="p-6 rounded-3xl w-full border-none italic-black">
                <textarea id="fopAddr" placeholder="АДРЕСА" class="p-6 rounded-3xl w-full h-32 border-none italic-black"></textarea>
            </div>
            <button onclick="finishOrder()" class="w-full orange-gradient text-white py-12 rounded-[50px] text-3xl shadow-2xl btn-click">ЗАМОВИТИ</button>
        </div>
    </div>

    <div id="pdf-page" class="page py-20 bg-gray-200">
        <div id="pdf-box" class="max-w-4xl mx-auto bg-white p-20 shadow-2xl border-t-[30px] border-orange-500">
            <div class="flex justify-between border-b-8 border-gray-100 pb-10 mb-10 italic-black">
                <div><h1 class="text-5xl text-orange-600">ORANTECH</h1><p>ЛУЦЬК, СВЕРСТЮКА, 1</p></div>
                <div class="text-right text-xs">
                    <p class="text-orange-500">ФОП ТОМЧИК Є.В.</p><p>ІПН: 3371909772</p>
                </div>
            </div>
            <h2 class="text-3xl mb-12 italic-black text-center">РАХУНОК №<span id="invId"></span></h2>
            <div id="pdfClient" class="mb-10 p-10 bg-gray-50 border-l-[20px] border-orange-500"></div>
            <table class="w-full text-left mb-10 text-xl"><thead class="border-b-4 border-black"><tr><th class="py-4">ТОВАР</th><th class="text-right">К-СТЬ</th></tr></thead><tbody id="pdfTable"></tbody></table>
            <div class="text-right text-4xl text-orange-500">ЦІНА ДОГОВІРНА</div>
        </div>
        <div class="max-w-4xl mx-auto mt-12 flex gap-10">
            <button onclick="downloadPDF()" class="flex-1 orange-gradient text-white py-10 rounded-3xl text-2xl btn-click italic-black">СКАЧАТИ PDF</button>
            <button onclick="goHome()" class="bg-white px-20 py-10 rounded-3xl border-4 btn-click italic-black">ГОЛОВНА</button>
        </div>
    </div>

    <div class="container mx-auto px-4 text-center mt-20 mb-20">
        <button onclick="openCallback()" class="orange-gradient text-white px-16 py-8 rounded-[40px] text-2xl shadow-2xl btn-click italic-black border-4 border-white">
            ПЕРЕДЗВОНІТЬ МЕНІ 📞
        </button>
    </div>

    <footer class="bg-gray-900 text-white py-20 text-center italic-black">
        <div class="text-3xl mb-6">ORAN<span class="text-orange-500">TECH</span></div>
        <p class="text-[9px] text-gray-700 tracking-[0.5em]">ЛУЦЬК • 2026 • © ORANTECH</p>
    </footer>

    <script>
        const cats = ["Принтери", "Ліхтарі", "ББЖ", "Модеми", "SSD", "Витратні", "Монітори", "Канцтовари"];
        const products = {
            "Canon MF3010": {
                img: "https://images.canon-europe.com/oe/products/all-in-one/i-sensys-mf3010/i-sensys-mf3010_main_1_tcm13-861110.jpg",
                price: "8 499 ₴",
                desc: "МФП ДЛЯ ОФІСУ ТА ФОП. ДРУК, КОПІР, СКАНЕР. НАДІЙНІСТЬ."
            }
        };
        let cart = {}; let currentProduct = "";

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('category-menu').style.display = 'none';
            window.scrollTo(0,0);
        }
        function goHome() {
            document.getElementById('main-banner').style.display = 'block';
            document.getElementById('service-grid').style.display = 'grid';
            document.getElementById('search-result-area').innerHTML = '';
            showPage('home-page');
        }
        function toggleMenu() {
            const m = document.getElementById('category-menu');
            m.style.display = (m.style.display === 'grid') ? 'none' : 'grid';
            m.innerHTML = cats.map(c => `<button onclick="openProduct('${c}')" class="p-6 bg-gray-50 rounded-2xl hover:bg-orange-100 text-[10px] text-left italic-black">${c}</button>`).join('');
        }
        function handleSearch(q) {
            if(!q) { goHome(); return; }
            q = q.toLowerCase();
            if(q.includes('3010') || q.includes('canon')) { openProduct('Canon MF3010'); return; }
            document.getElementById('main-banner').style.display = 'none';
            document.getElementById('service-grid').style.display = 'none';
            document.getElementById('search-result-area').innerHTML = `<div class="bg-white p-20 rounded-[50px] shadow-xl text-center border-t-[20px] border-orange-500">
                <h3 class="text-4xl mb-6 italic-black">${q}</h3><p class="mb-10 text-xs italic-black text-gray-400">Під замовлення (1 день)</p>
                <button onclick="addToCart('${q.toUpperCase()}')" class="orange-gradient text-white px-16 py-8 rounded-[40px] text-xl btn-click italic-black">У КОШИК 🚀</button>
            </div>`;
        }
        function openProduct(name) {
            if(name === "Принтери") name = "Canon MF3010";
            if(products[name]) {
                const p = products[name];
                document.getElementById('p-img').src = p.img;
                document.getElementById('p-title').innerText = name;
                document.getElementById('p-price').innerText = p.price;
                document.getElementById('p-desc').innerText = p.desc;
                currentProduct = name; showPage('product-page');
            } else { handleSearch(name); }
        }
        function addToCart(name) {
            cart[name] = (cart[name] || 0) + 1;
            document.getElementById('cart-count').innerText = Object.values(cart).reduce((a,b)=>a+b, 0);
            alert('ТОВАР В КОШИКУ!');
        }
        function toggleFop() { document.getElementById('fop-fields').style.display = (document.getElementById('pMethod').value === 'fop') ? 'block' : 'none'; }
        function finishOrder() {
            const mode = document.getElementById('pMethod').value;
            if(mode === 'fop') {
                document.getElementById('invId').innerText = Math.floor(Math.random()*9000)+1000;
                document.getElementById('pdfClient').innerHTML = `<p class="text-2xl italic-black">${document.getElementById('fopName').value || 'КЛІЄНТ'}</p><p>ЄДРПОУ: ${document.getElementById('fopCode').value || '-'}</p>`;
                document.getElementById('pdfTable').innerHTML = Object.entries(cart).map(([n,q]) => `<tr class="border-b"><td class="py-6 italic-black">${n}</td><td class="text-right italic-black">${q} ШТ.</td></tr>`).join('');
                showPage('pdf-page');
            } else {
                const text = `ЗАМОВЛЕННЯ:\n${Object.entries(cart).map(([n,q])=>`• ${n} (${q})`).join('\n')}`;
                window.location.href = `viber://forward?text=${encodeURIComponent(text)}`;
            }
        }
        function downloadPDF() { html2pdf().from(document.getElementById('pdf-box')).save('ORANTECH_RAHUNOK.pdf'); }
        function openCallback() { document.getElementById('callback-modal').style.display = 'flex'; }
        function closeCallback() { document.getElementById('callback-modal').style.display = 'none'; }
        function sendCallback() {
            const p = document.getElementById('cbPhone').value;
            if(p) window.location.href = `viber://forward?text=${encodeURIComponent('ПЕРЕДЗВОНІТЬ МЕНІ: ' + p)}`;
            closeCallback();
        }
    </script>
</body>
</html>
